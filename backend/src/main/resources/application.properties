spring.application.name=investigator-backend

# Optional AI routing layer for Investigator Assistant.
# When enabled, the backend asks an OpenAI-compatible chat completion API
# to decide which internal dataset workflow should handle the prompt.
assistant.ai.enabled=${ASSISTANT_AI_ENABLED:false}
assistant.ai.provider=${ASSISTANT_AI_PROVIDER:generic}
assistant.ai.base-url=${ASSISTANT_AI_BASE_URL:}
assistant.ai.api-key=${ASSISTANT_AI_API_KEY:}
assistant.ai.model=${ASSISTANT_AI_MODEL:gpt-4.1-mini}
assistant.ai.chat-completions-path=${ASSISTANT_AI_CHAT_COMPLETIONS_PATH:/chat/completions}
assistant.ai.github-api-version=${ASSISTANT_AI_GITHUB_API_VERSION:2026-03-10}

# Example for GitHub Models / Copilot-backed OpenAI-compatible routing:
# ASSISTANT_AI_ENABLED=true
# ASSISTANT_AI_PROVIDER=github
# ASSISTANT_AI_BASE_URL=https://models.github.ai
# ASSISTANT_AI_CHAT_COMPLETIONS_PATH=/inference/chat/completions
# ASSISTANT_AI_MODEL=openai/gpt-4.1
